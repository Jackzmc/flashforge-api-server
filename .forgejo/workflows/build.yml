on:
  push:

jobs:
  build:
    runs-on: debian-latest
    strategy:
      matrix:
        BUILD_TARGET: [release] # refers to a cargo profile
    steps:
      - name: Checkout
        uses: https://git.jackz.me/actions/checkout@v6
      - name: Build
        run: cargo build --profile ${{ matrix.BUILD_TARGET }}
      - name: Run tests
        run: cargo test --profile ${{ matrix.BUILD_TARGET }}
      - name: Upload artifacts
        uses: https://git.jackz.me/actions/upload-artifact@v5
        with:
          name: ${{ matrix.BUILD_TARGET }}
          path: |
            target/${{ matrix.BUILD_TARGET }}/flashforge-api-server
          compression-level: 8
